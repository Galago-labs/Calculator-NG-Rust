name: Build Calculator-NG

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build for Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/checkouts/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Prepare artifact
        shell: cmd
        run: |
          mkdir dist
          copy target\x86_64-pc-windows-msvc\release\Calculator-NG.exe dist\Calculator-NG.exe

      - name: Show binary info
        shell: pwsh
        run: |
          $f = Get-Item dist\Calculator-NG.exe
          Write-Host "Size: $([math]::Round($f.Length/1KB)) KB"
          $v = (Get-Item dist\Calculator-NG.exe).VersionInfo
          Write-Host "Company:     $($v.CompanyName)"
          Write-Host "Description: $($v.FileDescription)"
          Write-Host "Copyright:   $($v.LegalCopyright)"

      - name: Upload Calculator-NG.exe
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-NG-Windows-x64
          path: dist/Calculator-NG.exe
          retention-days: 30

      - name: Upload Cargo.lock
        uses: actions/upload-artifact@v4
        with:
          name: Cargo.lock
          path: Cargo.lock
          retention-days: 7
